version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: articurated-postgres
    environment:
      POSTGRES_DB: articurated
      POSTGRES_USER: articurated
      POSTGRES_PASSWORD: articurated
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U articurated"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: articurated-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: articurated-app
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/articurated
      DB_USERNAME: articurated
      DB_PASSWORD: articurated
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      INVOICE_PATH: /tmp/invoices
    ports:
      - "8080:8080"
    volumes:
      - invoice_storage:/tmp/invoices
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  rabbitmq_data:
  invoice_storage:
