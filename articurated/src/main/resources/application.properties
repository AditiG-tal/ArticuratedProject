spring.application.name=articurated-order-management

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/articurated}
spring.datasource.username=${DB_USERNAME:articurated}
spring.datasource.password=${DB_PASSWORD:articurated}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# PDF storage path
app.invoice.storage-path=${INVOICE_PATH:/tmp/invoices}

# Mock payment gateway
app.payment-gateway.url=${PAYMENT_GATEWAY_URL:http://mock-payment-gateway:8081}

# Server
server.port=8080

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
